<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard - UNER</title>
    <link rel="stylesheet" href="/public/css/styles.css" />
    <link rel="stylesheet" href="dashboard.css" />
  </head>
  <body>
    <main class="dashboard-container">
      <header class="dashboard-header fade-in">
        <h2 class="section-title">DASHBOARD</h2>
      </header>

      <div class="search-wrapper fade-in delay-1">
        <input
          type="text"
          class="form-control search-input"
          placeholder="Buscar..."
        />
        <button class="btn-primary btn-search" aria-label="Buscar">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="20"
            height="20"
            fill="currentColor"
            viewBox="0 0 16 16"
          >
            <path
              d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001c.03.04.062.078.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1.007 1.007 0 0 0-.115-.1zM12 6.5a5.5 5.5 0 1 1-11 0 5.5 5.5 0 0 1 11 0z"
            />
          </svg>
        </button>
      </div>

      <div class="dashboard-grid">
        <div class="card stat-card fade-in delay-2">
          <div class="stat-icon text-green">
            <svg width="32" height="32" fill="currentColor" viewBox="0 0 16 16">
              <path
                d="M7 14s-1 0-1-1 1-4 5-4 5 3 5 4-1 1-1 1H7Zm4-6a3 3 0 1 0 0-6 3 3 0 0 0 0 6Zm-5.784 6A2.238 2.238 0 0 1 5 13c0-1.355.68-2.75 1.936-3.72A6.325 6.325 0 0 0 5 9c-4 0-5 3-5 4s1 1 1 1h4.216ZM4.5 8a2.5 2.5 0 1 0 0-5 2.5 2.5 0 0 0 0 5Z"
              />
            </svg>
          </div>
          <div class="stat-content">
            <p class="stat-label">Total Estudiantes</p>
            <h3 class="stat-value">1250</h3>
          </div>
        </div>

        <div class="card stat-card fade-in delay-3">
          <div class="stat-icon text-green">
            <svg width="32" height="32" fill="currentColor" viewBox="0 0 16 16">
              <path
                d="M14.5 3a.5.5 0 0 1 .5.5v9a.5.5 0 0 1-.5.5h-13a.5.5 0 0 1-.5-.5v-9a.5.5 0 0 1 .5-.5h13zm-13-1A1.5 1.5 0 0 0 0 3.5v9A1.5 1.5 0 0 0 1.5 14h13a1.5 1.5 0 0 0 1.5-1.5v-9A1.5 1.5 0 0 0 14.5 2h-13z"
              />
              <path
                d="M5 8a.5.5 0 0 1 .5-.5h7a.5.5 0 0 1 0 1h-7A.5.5 0 0 1 5 8zm0-2.5a.5.5 0 0 1 .5-.5h7a.5.5 0 0 1 0 1h-7a.5.5 0 0 1-.5-.5zm0 5a.5.5 0 0 1 .5-.5h7a.5.5 0 0 1 0 1h-7a.5.5 0 0 1-.5-.5zm-1-5a.5.5 0 1 1-1 0 .5.5 0 0 1 1 0zM4 8a.5.5 0 1 1-1 0 .5.5 0 0 1 1 0zm0 2.5a.5.5 0 1 1-1 0 .5.5 0 0 1 1 0z"
              />
            </svg>
          </div>
          <div class="stat-content">
            <p class="stat-label">Total Cursos</p>
            <h3 class="stat-value">45</h3>
          </div>
        </div>

        <div class="card stat-card stat-wide fade-in delay-4">
          <div class="stat-icon bg-green text-white">
            <svg width="32" height="32" fill="currentColor" viewBox="0 0 16 16">
              <path
                d="M15 14s1 0 1-1-1-4-5-4-5 3-5 4 1 1 1 1h8Zm-7.978-1A.261.261 0 0 1 7 12.996c.001-.264.167-1.03.76-1.72C8.312 10.629 9.282 10 11 10c1.717 0 2.687.63 3.24 1.276.593.69.758 1.457.76 1.72l-.008.002a.274.274 0 0 1-.014.002H7.022ZM11 7a2 2 0 1 0 0-4 2 2 0 0 0 0 4Zm3-2a3 3 0 1 1-6 0 3 3 0 0 1 6 0ZM6.936 9.28a5.88 5.88 0 0 0-1.23-.247A7.35 7.35 0 0 0 5 9c-4 0-5 3-5 4 0 .667.333 1 1 1h4.216A2.238 2.238 0 0 1 5 13c0-1.355.68-2.75 1.936-3.72ZM4.5 8a2.5 2.5 0 1 0 0-5 2.5 2.5 0 0 0 0 5Z"
              />
            </svg>
          </div>
          <div class="stat-content">
            <p class="stat-label">Total Estudiantes</p>
            <h3 class="stat-value">110</h3>
          </div>
        </div>

        <div class="card list-card fade-in delay-5">
          <h3 class="list-title">Cursos Activos</h3>
          <ul class="course-list">
            <li><a href="#">Cursos Activos Mattoo 1</a></li>
            <li><a href="#">Cursos Activos Marloo 2</a></li>
            <li><a href="#">Cursos Activos Mano 2</a></li>
            <li><a href="#">Curspe Activos</a></li>
            <li><a href="#">Cursos Activos Menlera 1</a></li>
            <li><a href="#">Cursos Activos Menisitno 2</a></li>
            <li><a href="#">Curspe Activos</a></li>
          </ul>
        </div>
      </div>
    </main>
  </body>
</html>
